<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pilha de Planté Premium</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

/* TÍTULO */
h1 {
    margin-top: 30px;
    font-size: 28px;
}

/* CONTAINER */
.container {
    position: relative;
    height: 300px;
    margin-top: 40px;
}

/* SOLUÇÃO */
.solucao {
    position: absolute;
    left: 25%;
    width: 50%;
    height: 220px;
    border-radius: 20px;
    background: rgba(0, 150, 255, 0.2);
    backdrop-filter: blur(10px);
    transition: 0.5s;
}

/* ELETRODOS */
.eletrodo {
    width: 80px;
    height: 200px;
    position: absolute;
    top: 50px;
    border-radius: 12px;
}

.anodo {
    left: 30%;
    background: linear-gradient(#444, #888);
}

.catodo {
    right: 30%;
    background: linear-gradient(#aaa, #ddd);
}

/* SETA */
.seta {
    position: absolute;
    top: 120px;
    width: 50px;
    height: 5px;
    opacity: 0;
}

.seta::after {
    content: "";
    position: absolute;
    right: -10px;
    top: -5px;
    border-left: 10px solid #00eaff;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
}

/* INVERTIDA */
.invertida::after {
    left: -10px;
    border-left: none;
    border-right: 10px solid #00ff88;
}

/* ANIMAÇÕES */
@keyframes direita {
    0% { left: 35%; opacity: 1; }
    100% { left: 60%; opacity: 0; }
}

@keyframes esquerda {
    0% { left: 60%; opacity: 1; }
    100% { left: 35%; opacity: 0; }
}

.descarga {
    animation: direita 1.5s infinite;
}

.carga {
    animation: esquerda 1.5s infinite;
}

/* GLOW */
.glow {
    position: absolute;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(0,255,255,0.4), transparent);
    top: 50px;
    left: 40%;
    opacity: 0;
    transition: 0.5s;
}

/* BOTÕES */
button {
    margin: 10px;
    padding: 12px 25px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    color: white;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

button:hover {
    background: rgba(255,255,255,0.2);
}

/* BARRA DE ENERGIA */
.barra {
    width: 300px;
    height: 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    margin: 20px auto;
    overflow: hidden;
}

.energia {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00eaff, #00ff88);
    transition: width 0.5s;
}

/* TEXTO */
.info {
    margin-top: 20px;
    opacity: 0.8;
}
</style>
</head>

<body>

<h1>Pilha de Planté ⚡</h1>

<div class="container">
    <div id="solucao" class="solucao"></div>
    <div class="eletrodo anodo"></div>
    <div class="eletrodo catodo"></div>
    <div id="seta" class="seta"></div>
    <div id="glow" class="glow"></div>
</div>

<div class="barra">
    <div id="energia" class="energia"></div>
</div>

<p id="contador">Energia: 0%</p>

<button onclick="modoDescarga()">🔵 Descarga</button>
<button onclick="modoCarga()">🟢 Carga</button>

<div class="info">
    <p>Descarga: gera energia elétrica</p>
    <p>Carga: recarrega a bateria</p>
</div>

<script>
let energia = 0;
let intervalo;

const seta = document.getElementById("seta");
const solucao = document.getElementById("solucao");
const glow = document.getElementById("glow");
const barra = document.getElementById("energia");
const contador = document.getElementById("contador");

function atualizarEnergia() {
    barra.style.width = energia + "%";
    contador.innerText = "Energia: " + energia + "%";
}

function modoDescarga() {
    clearInterval(intervalo);

    seta.className = "seta descarga";
    solucao.style.background = "rgba(0,150,255,0.2)";
    glow.style.opacity = 1;

    intervalo = setInterval(() => {
        if (energia > 0) energia--;
        atualizarEnergia();
    }, 100);
}

function modoCarga() {
    clearInterval(intervalo);

    seta.className = "seta carga invertida";
    solucao.style.background = "rgba(0,255,150,0.2)";
    glow.style.opacity = 1;

    intervalo = setInterval(() => {
        if (energia < 100) energia++;
        atualizarEnergia();
    }, 100);
}
</script>

</body>
</html>
